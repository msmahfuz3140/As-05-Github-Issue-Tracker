    <!-- added daisy+tailwind cdn -->

        * {
            font-family: "Outfit", sans-serif;

<body>
    <!-- navbar -->
    <header>
        <div
            class="navbar bg-base-100 shadow-sm px-1 md:px-10 md:flex md:justify-between block justify-center items-center">
            <div class="grid grid-cols-1 md:grid-cols-2 my-5">
                <a class="btn btn-ghost text-xl">
                    <img class="w-10" src="./assets/github-logo.png" alt="">
                    <h1>GitHub Issues Tracker</h1>
                </a>
            </div>
            <div class="flex gap-2 justify-center items-center px-8">
                <input id="input-search" type="text" placeholder="Search Issues..." class="input input-bordered w-full md:w-auto" />
                <div class="dropdown dropdown-end">
                    <div>
                        <button id="btn-search" class="btn btn-primary">Search</button>
                    </div>

                </div>
            </div>
        </div>
    </header>

    <main>
        <!-- btn selected -->
        <section class="w-11/12 mx-auto mt-12">
            <div id="allBtnContainer" class="bg-base-200 p-5 space-x-5 rounded-xl">
                <button class="btn btn-nav btn-primary">All</button>
                <button class="btn btn-nav">Open</button>
                <button class="btn btn-nav">Closed</button>
            </div>
        </section>

        <!-- all lessons count -->
        <section class="w-11/12 mx-auto mt-10">
            <div id="lessonCountContainer"
                class="block md:flex justify-center md:justify-between bg-base-200 p-5 items-center rounded-xl">
                <div class="lesson-left flex gap-3">
                    <img class="w-10 h-10 md:w-12 md:h-12" src="./assets/Aperture.png" alt="">
                    <div>
                        <h1 class="text-xl font-bold"><span id="issueCount">0</span> Issue</h1>
                        <p class="text-gray-400 font-semibold">Track and manage your project issues</p>
                    </div>
                </div>

                <div class="lesson-right flex justify-center items-center">
                    <div class="my-5">
                        <span class="rounded-full bg-green-500"><i class="fa-regular fa-circle"></i></span>
                        <span class="mr-2">Open</span>
                    </div>
                    <div>
                        <span class="rounded-full bg-purple-500"><i class="fa-regular fa-circle"></i></span>
                        <span>Closed</span>
                    </div>
                </div>
            </div>
        </section>

        <!-- loading spinner -->
        <section id="spinner" class="flex justify-center items-center mt-8 hidden">
            <span class="loading loading-spinner loading-xl"></span>
        </section>

        <!-- load all issues -->
        <section id="issue-container" class="w-11/12 mx-auto mt-10">
            <div id="all-issues-container" class="grid grid-cols-1 md:grid-cols-4 gap-5 bg-base-200 rounded-xl p-8">

                        <p class="bg-red-100 text-red-500 px-3 py-1 rounded-lg border border-red-400 font-medium">high
                        </p>
                    </div>
                    <h1 class="text-2xl font-semibold">Fix navigation menu on mobile devices</h1>
                    <p class="text-lg font-medium text-gray-400">The navigation menu doesn't collapse properly on mobile
                        devices...</p>
                    <div class="flex gap-3 items-center">
                        <p
                            class="bg-red-100 text-red-500 font-medium text-xl px-2 py-1 rounded-lg border border-red-500">
                            <i class="fa-solid fa-bug"></i> BUG</p>
                        <p
                            class="bg-yellow-100 text-yellow-500 font-medium text-xl px-2 py-1 rounded-lg border border-yellow-500">

                </div> -->
            </div>
            <div id="open-issues-container"
                class="hidden grid grid-cols-1 md:grid-cols-4 gap-5 bg-base-200 rounded-xl p-8"></div>

            <div id="closed-issues-container"
                class="hidden grid grid-cols-1 md:grid-cols-4 gap-5 bg-base-200 rounded-xl p-8"></div>
        </section>

        <!-- Open the modal using ID.showModal() method -->
        <!-- <button class="btn" onclick="my_modal_5.showModal()">open modal</button> -->
        <dialog id="my_modal_5" class="modal modal-bottom sm:modal-middle">
            <div class="modal-box">
                <div id="details-container" class="space-y-5">

                </div>
                <div class="modal-action">
                    <form method="dialog">
                        <!-- if there is a button in form, it will close the modal -->
                        <button class="btn btn-primary px-5">Close</button>
                    </form>
                </div>
            </div>
        </dialog>

    </main>

    <script src="./script/script.js"></script>

</body>
