<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Github_Issue_Tracker | Home</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- added daisy+tailwind cdn -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font add  -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <style>
        * {
            font-family: "Outfit", sans-serif;
        }
    </style>

</head>

<body>
    <!-- navbar -->
    <header>
        <div class="navbar bg-base-100 shadow-sm px-10">
            <div class="flex-1">
                <a class="btn btn-ghost text-xl">
                    <img class="w-10" src="./assets/github-logo.png" alt="">
                    <h1>GitHub Issues Tracker</h1>
                </a>
            </div>
            <div class="flex gap-2">
                <input type="text" placeholder="Search Issues..." class="input input-bordered w-24 md:w-auto" />
                <div class="dropdown dropdown-end">
                    <div>
                        <button class="btn btn-primary">+ New Issue</button>
                    </div>

                </div>
            </div>
        </div>
    </header>

    <main>
        <!-- btn selected -->
        <section class="w-11/12 mx-auto mt-12">
            <div id="allBtnContainer" class="bg-base-200 p-5 space-x-5 rounded-xl">
                <button class="btn btn-nav btn-primary">All</button>
                <button class="btn btn-nav">Open</button>
                <button class="btn btn-nav">Closed</button>
            </div>
        </section>

    </main>

    <script src="./script/script.js"></script>

</body>

</html>
